name: Update Meal Index

on:
  schedule:
    # UTC 23:00 = 北京时间 07:00（次日）
    - cron: "0 23 * * *"
  workflow_dispatch: # 手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run scheduler
        env:
          ACCOUNT: ${{ secrets.ACCOUNT }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: uv run python scheduler.py

      - name: Copy data.json to web/public for Vite build
        run: cp web/data.json web/public/data.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data.json web/public/data.json meal_index.db
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update meal index data for $(TZ='Asia/Shanghai' date +%Y-%m-%d)"
            git push
          fi
